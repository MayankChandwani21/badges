<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>badges</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>contextual badges</h1>
        <span class="badges badge-primary">Primary</span>
        <span class="badges badge-secondary">secondary</span>
        <span class="badges badge-success">success</span>
        <span class="badges badge-danger">danger</span>
        <span class="badges badge-warning">warning</span>
        <span class="badges badge-info">info</span>
        <span class="badges badge-light">light</span>
        <span class="badges badge-dark">dark</span>
    </div>
</body>
</html>
